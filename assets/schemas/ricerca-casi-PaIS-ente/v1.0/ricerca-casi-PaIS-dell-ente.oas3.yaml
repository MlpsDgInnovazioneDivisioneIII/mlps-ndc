paths:
  /fsl/areasociale/v1/casi:
    post:
      tags:
        - Gepi
      summary: Consultazione dati generali del Caso
      description: Dato l'ambito territoriale sociale (ATS) di riferimento (in termini di codice ATS e comuni), il servizio restituisce i Casi in gestione agli assistenti sociali per la definizione del Patto per l’Inclusione Sociale (PaIS)
      operationId: ConsultazioneDatiGeneraliDelCaso
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.DatiGeneraliCaso_Input'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.DatiGeneraliCaso_Output'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '500':
          description: Internal Server Error
  /status:
    get:
      tags:
        - Health Check API
      description: Returns the health status of this service
      operationId: HealthCheckStatus
      responses:
        '200':
          description: API service is healthy
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/FSL.Common.Support.Models.Api.HealthCheckSuccess'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '500':
          description: Internal Server Error
        '503':
          description: API service is not healthy
components:
  schemas:
    FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.Caso:
      type: object
      properties:
        identificativo:
          type: string
        referenteNucleo:
          type: string
          nullable: true
        stato:
          type: integer
          format: int32
        misure:
          type: array
          items:
            type: string
        nucleo:
          type: array
          items:
            $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.Nucleo'
        istatComune:
          type: string
        codiceATS:
          type: string
        caseManager:
          type: string
          nullable: true
        dataCreazione:
          type: string
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/labour-social-policies/onto/social/CasoDiNucleoFragileOInPovertà
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/labour-social-policies/onto/social/
        identificativo: identificativoCasoNucleoFragile
        referenteNucleo: https://w3id.org/italia/onto/CPV/taxCode
        stato: statusDiGestioneDiDomandaDiCaso
        misure:
          '@id': https://w3id.org/italia/labour-social-policies/onto/core/protocolloMisuraDomandaPrestazioneDiSostegno
        nucleo:
          '@id': haNucleoFamiliareFragileOInPovertà
        istatComune:
          '@id': https://w3id.org/italia/onto/CLV/hasCity
          '@context':
              label: http://www.w3.org/2000/01/rdf-schema#label
        codiceATS:
          '@id': https://w3id.org/italia/labour-social-policies/onto/core/appartieneAdAmbitoTerritoriale
          '@type': '@id'
          '@context':
              "@base": 'https://w3id.org/italia/labour-social-policies/controlled-vocabulary/data/tipo_ambito_territoriale/'
              id: '@id'
        caseManager: https://w3id.org/italia/onto/CPV/taxCode
        dataCreazione: dataInizioGestioneCaso
      example:
        identificativo: 'GEPI-20250101-1'
        referenteNucleo: 'AAAAAA00A00A000A'
        stato: 1
        misure:
           - 'INPS-ADI-2024-9XXXX43'
        nucleo:
           - codiceFiscale: 'AAAAAA00A00A000A'
             attivo: True
             motivazioneDisattivazione: 'decesso'
        istatComune: '058091'
        codiceATS: '5-202004142240267'
        caseManager: 'AAAAAA00A00A000A'
        dataCreazione: '2025-01-23'

    FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.Data:
      type: object
      properties:
        totaleCasi:
          type: integer
          format: int32
        nPagina:
          type: integer
          format: int32
        casi:
          type: array
          items:
            $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.Caso'
      additionalProperties: false
    FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.DatiGeneraliCaso_Input:
      required:
        - cFOperatore
        - modalitaAccesso
        - nPagina
      type: object
      properties:
        codiceATS:
          type: string
          nullable: true
        comuni:
          type: array
          items:
            type: string
          nullable: true
        modalitaAccesso:
          type: integer
          format: int32
        cFOperatore:
          minLength: 1
          type: string
        nPagina:
          type: integer
          format: int32
        dataInizio:
          type: string
          nullable: true
        dataFine:
          type: string
          nullable: true
      additionalProperties: false
    FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.DatiGeneraliCaso_Output:
      required:
        - data
        - esito
      type: object
      properties:
        esito:
          $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.Esito'
        data:
          $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.Data'
      additionalProperties: false
    FSL.Api.Domain.Models.Gepi.DatiGeneraliCaso.Nucleo:
      type: object
      properties:
        codiceFiscale:
          type: string
        attivo:
          type: boolean
        motivazioneDisattivazione:
          type: string
          nullable: true
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/labour-social-policies/onto/social/ComponenteNucleoAttivoNelCaso
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/labour-social-policies/onto/social/
        codiceFiscale: https://w3id.org/italia/onto/CPV/taxCode
        attivo: avvisoComponenteAttivoNelCaso
        motivazioneDisattivazione: motivoDisattivazioneDaNucleoFamiliare
      example:
        codiceFiscale: 'AAAAAA00A00A000A'
        attivo: True
        motivazioneDisattivazione: 'decesso'

    FSL.Api.Domain.Models.Gepi.Esito:
      required:
        - codiceEsito
        - descrizioneEsito
      type: object
      properties:
        codiceEsito:
          minLength: 1
          type: string
        descrizioneEsito:
          minLength: 1
          type: string
      additionalProperties: false

    FSL.Common.Support.Models.Api.HealthCheckSuccess:
