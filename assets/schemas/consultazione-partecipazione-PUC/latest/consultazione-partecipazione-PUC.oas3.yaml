        - esito
      type: object
      properties:
        esito:
          $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.Esito'
        data:
          $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.ConsultazionePartecipazioniPUC.Data'
      additionalProperties: false

    FSL.Api.Domain.Models.Gepi.ConsultazionePartecipazioniPUC.Data:
      type: object
      properties:
        partecipazioni:
          type: array
          items:
            $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.ConsultazionePartecipazioniPUC.Partecipazione'
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/labour-social-policies/onto/social/PartecipazionePUC
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/labour-social-policies/onto/social/
        partecipazioni:
          '@id': haPartecipazionePUC
      example:
        partecipazioni:
          - identificativoPUC: '123456789123456789'
            titoloPUC: 'Titolo test PUC'
            descrizionePUC: 'Descrizione test PUC'
            dataInizioAttivita: '07-01-2025'
            dataFineAttivita: '31-12-2025'
            dataInizioPolizza: '01-01-2025'
            dataFinePolizza: '31-12-2025'
