paths:
  /fsl/areasociale/v1/misure-per-cittadino:
    post:
      tags:
        - Gepi
      summary: Elenco misure di inclusione richieste dal cittadino
      description: Dato il codice fiscale di un cittadino (richiedente o membro di un nucleo familiare che ha presentato domanda per una misura di inclusione), il servizio restituisce le misure di inclusione sociale e lavorativa presentate
      operationId: ElencoMisureCittadino
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.ElencoMisureCittadino.ElencoMisureCittadino_Input'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FSL.Api.Domain.Models.Gepi.ElencoMisureCittadino.ElencoMisureCittadino_Output'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '500':
          description: Internal Server Error
