paths:
  /fsl/v2/manifestazioniInteresse:
    post:
      tags:
        - Siisl
      summary: Consultazione manifestazione di interesse a corsi di formazione
      description: Dato il codice fiscale di un cittadino (più gli eventuali dati dell'entità chiamante), il servizio restituisce tutte le relative manifestazioni di interesse a corsi di formazione
      operationId: ConsultazioneInteressiOfferteFormative
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FSL.Api.Domain.Models.Siisl.InputConsultazione'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FSL.Api.Domain.Models.Siisl.ConsultazioneInteressiOfferteFormative.InteresseCorsoFormativo'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '500':
          description: Internal Server Error
  /status:
    get:
      tags:
        - Health Check API
      description: Returns the health status of this service
      operationId: HealthCheckStatus
      responses:
        '200':
          description: API service is healthy
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/FSL.Common.Support.Models.Api.HealthCheckSuccess'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Microsoft.AspNetCore.Mvc.ProblemDetails'
        '500':
          description: Internal Server Error
        '503':
          description: API service is not healthy
components:
  schemas:
    FSL.Api.Domain.Models.Siisl.ConsultazioneInteressiOfferteFormative.CorsoFormativo:
      type: object
      properties:
        idCorso:
          type: string
        idCorsoRegione:
          type: string
        codiceRegione:
          type: string
        origineCorso:
          type: string
        titolo:
          type: string
          nullable: true
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/labour-social-policies/onto/labour/OffertaFormativa
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/labour-social-policies/onto/labour/
        idCorso: idOffertaFormativa
        idCorsoRegione: codiceCorsoRegionale
        codiceRegione:
          '@id': haRegioneOrganizatriceCorso
          '@type': '@id'
          '@context':
              "@base": 'https://w3id.org/italia/labour-social-policies/controlled-vocabulary/data/tipo_regione/'
              id: '@id'
        origineCorso: origineOffertaFormativa
        titolo: titoloOffertaFormativa
      example:
        idCorso: '00934260571-000004'
        idCorsoRegione: '524234'
        codiceRegione: '8'
        origineCorso: 'Siisl'
        titolo: 'Digital Marketing e Social media Management'

    FSL.Api.Domain.Models.Siisl.ConsultazioneInteressiOfferteFormative.InteresseCorsoFormativo:
      type: object
      properties:
        dataManifestazione:
          type: string
          format: date-time
        corso:
          $ref: '#/components/schemas/FSL.Api.Domain.Models.Siisl.ConsultazioneInteressiOfferteFormative.CorsoFormativo'
      additionalProperties: false
      x-jsonld-type: https://w3id.org/italia/labour-social-policies/onto/labour/ManifestazioneInteresseOffertaFormativa
      x-jsonld-context:
        "@vocab": https://w3id.org/italia/labour-social-policies/onto/labour/
        dataManifestazione: dataManifestazioneInteresseFormazione
        corso:
          '@id': haOffertaFormativaDiInteresse
      example:
        dataManifestazione: '2025-01-14T00:00:00Z'

    FSL.Api.Domain.Models.Siisl.InputConsultazione:
      required:
        - codiceFiscaleCittadino
      type: object
      properties:
        codiceATS:
          type: string
          nullable: true
        comuni:
          type: array
          items:
            type: string
          nullable: true
        cfOperatore:
          type: string
          nullable: true
        codiceFiscaleCittadino:
          minLength: 1
          type: string
      additionalProperties: false

    FSL.Common.Support.Models.Api.HealthCheckSuccess:
      type: object
      properties:
        status:
          type: string
        totalDuration:
          type: string
        entries: {}
        title:
          type: string
          nullable: true
        detail:
          type: string
          nullable: true
      additionalProperties: false
    Microsoft.AspNetCore.Mvc.ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
      additionalProperties: {}
tags:
  - name: Siisl
    description: Siisl
  - name: Health Check API
    description: Health Check API